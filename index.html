<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>食材分析デモアプリ</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a7f3c">
  <link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="favicon-512.png">
</head>
<body>
  <div class="container">
    <h1>食材分析デモアプリ</h1>
    <div id="auth-bar" style="display:flex;gap:8px;justify-content:center;align-items:center;margin-bottom:12px;flex-wrap:wrap;">
      <button id="loginButton" type="button">Googleでログイン</button>
      <button id="logoutButton" type="button" style="display:none;">ログアウト</button>
      <div id="userInfo" style="display:none;align-items:center;gap:8px;">
        <span style="color:#1a7f3c;">👤</span>
        <span id="userName" style="color:#1a7f3c;font-weight:600;"></span>
      </div>
    </div>
    <label for="api-key" style="display:none;">OpenAI APIキー:</label>
    <input type="password" id="api-key" placeholder="APIキーを入力してください" style="display:none;">
    <div id="camera-area">
      <video id="video" autoplay playsinline></video>
      <canvas id="canvas" style="display:none;"></canvas>
      <img id="preview" alt="プレビュー" style="display:none;width:100%;border-radius:12px;border:1.5px solid #b2e6c7;background:#f8fff8;margin-top:8px;" />
    </div>
    <div id="controls" style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
      <button id="capture-btn">撮影</button>
      <input id="upload-image" type="file" accept="image/*" style="display:none;">
      <button id="gallery-btn" type="button">画像を選択</button>
      <button id="retake-btn" style="display:none;">撮り直す</button>
      
      <div style="flex-basis:100%;height:0;"></div>
      <select id="lang-select" aria-label="言語 / Language" style="padding:8px;border-radius:8px;border:1.5px solid #b2e6c7;background:#f8fff8;">
        <option value="ja" selected>日本語</option>
        <option value="pt">Português</option>
        <option value="en">English</option>
      </select>
      <select id="time-select" aria-label="所要時間" style="padding:8px;border-radius:8px;border:1.5px solid #b2e6c7;background:#f8fff8;">
        <option value="any" selected>時間: 指定なし</option>
        <option value="15">~15分</option>
        <option value="30">~30分</option>
        <option value="60">~60分</option>
      </select>
      <select id="diet-select" aria-label="食事制限" style="padding:8px;border-radius:8px;border:1.5px solid #b2e6c7;background:#f8fff8;">
        <option value="none" selected>食事制限: なし</option>
        <option value="vegetarian">Vegetarian</option>
        <option value="vegan">Vegan</option>
        <option value="gluten-free">Gluten-free</option>
        <option value="low-carb">Low-carb</option>
      </select>
      
      <button id="analyze-btn">分析する</button>
    </div>
    <div id="result-area">
      <div id="description"></div>
      <div id="ingredients" aria-label="検出された食材" style="display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-start;margin-bottom:10px;"></div>
      <div id="recipes"></div>
      <div id="recipe-detail"></div>
      <button id="save-recipe-btn" style="display:none; margin-top:12px;">レシピを保存</button>
      <button id="view-history-btn" style="margin-top:12px;">保存したレシピを見る</button>
      <div id="toast" class="toast" style="display:none;"></div>
      <div id="spinner" class="spinner" style="display:none;"></div>
    </div>
    <!-- Modal de histórico -->
    <div id="history-modal" class="modal" style="display:none;">
      <div class="modal-content">
        <span id="close-history" class="close">&times;</span>
        <div id="history-header">
          <span id="history-counter"></span>
          <input id="history-filter" type="text" placeholder="キーワードで検索" />
          <button id="clear-history-btn">履歴をクリア</button>
        </div>
        <div id="history-list"></div>
      </div>
    </div>
  </div>
  <script src="camera.js"></script>
  <script src="openai.js"></script>
  <script src="voice.js"></script>
  <script src="history.js"></script>
  <script src="main.js"></script>
  <script type="module" src="firebase.js"></script>
  <script type="module" src="auth.js"></script>
  <script>
    // Service Worker registration for PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('service-worker.js');
      });
    }
    // Evento para botao de galeria
    document.getElementById('gallery-btn').onclick = function() {
      document.getElementById('upload-image').click();
    };
  </script>
</body>
</html>
