<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: blob: https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://www.googleapis.com https://accounts.google.com https://apis.google.com; connect-src 'self' https://firestore.googleapis.com https://securetoken.googleapis.com https://identitytoolkit.googleapis.com https://www.googleapis.com; frame-src https://accounts.google.com https://apis.google.com; frame-ancestors 'self';">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>ログイン</h1>
    <div style="display:flex;flex-direction:column;gap:10px;align-items:stretch;">
      <input id="email" type="email" placeholder="メール" style="padding:10px;border:1.5px solid #b2e6c7;border-radius:8px;">
      <input id="password" type="password" placeholder="パスワード" style="padding:10px;border:1.5px solid #b2e6c7;border-radius:8px;">
      <button id="emailLoginBtn">ログイン</button>
      <div style="height:6px;"></div>
      <button id="googleLoginBtn">Googleでログイン</button>
      <div style="margin-top:10px;color:#1a7f3c;">
        初めてですか？ <a href="register.html">新規登録</a>
      </div>
      <div id="loginMsg" style="margin-top:8px;color:#e94a21;"></div>
    </div>
  </div>
  <script type="module" src="firebase.js"></script>
  <script type="module" src="login.js"></script>
</body>
</html>
